name: bump-version

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  bump:
    # Don't run on the commit that this workflow itself creates/pushes
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide bump (major/minor/patch)
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          # Use the commit that triggered the workflow (not "whatever HEAD is later")
          sha="${GITHUB_SHA}"
          subject="$(git show -s --format=%s "$sha")"
          body="$(git show -s --format=%b "$sha")"

          # Normalize
          s="$(echo "$subject" | tr '[:upper:]' '[:lower:]' | sed -E 's/^[[:space:]]+//')"

          # Accept: "major", "major:", "major -", "major: blah", etc.
          bump=""
          if [[ "$s" =~ ^major([[:space:]]|:|$) ]]; then bump="major"; fi
          if [[ "$s" =~ ^minor([[:space:]]|:|$) ]]; then bump="minor"; fi
          if [[ "$s" =~ ^patch([[:space:]]|:|$) ]]; then bump="patch"; fi

          echo "commit_subject=$subject" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Stop if no bump keyword
        if: steps.bump.outputs.bump == ''
        run: |
          echo "No major/minor/patch keyword at start of commit Summary; skipping."
          exit 0

      - name: Bump VERSION
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          test -f VERSION || { echo "VERSION file missing"; exit 1; }
          v="$(tr -d ' \t\r\n' < VERSION)"
          IFS='.' read -r major minor patch <<< "$v"

          re='^[0-9]+$'
          [[ "${major:-}" =~ $re && "${minor:-}" =~ $re && "${patch:-}" =~ $re ]] || { echo "Bad VERSION: $v"; exit 1; }

          bump="${{ steps.bump.outputs.bump }}"
          if [[ "$bump" == "major" ]]; then
            major=$((major+1)); minor=0; patch=0
          elif [[ "$bump" == "minor" ]]; then
            minor=$((minor+1)); patch=0
          else
            patch=$((patch+1))
          fi

          new="${major}.${minor}.${patch}"
          echo "$new" > VERSION
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Commit VERSION bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.ver.outputs.new }}"

      - name: Tag
        shell: bash
        run: |
          set -euo pipefail
          git tag -a "v${{ steps.ver.outputs.new }}" -m "v${{ steps.ver.outputs.new }}"

      - name: Push commit + tag
        shell: bash
        run: |
          set -euo pipefail
          git push origin main
          git push origin "v${{ steps.ver.outputs.new }}"